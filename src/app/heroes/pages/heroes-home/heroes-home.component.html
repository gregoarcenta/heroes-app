<mat-sidenav-container fullscreen class="example-container" (backdropClick)="sidenav.close()">

  <mat-sidenav #sidenav mode="push" (keydown.escape)="sidenav.close()" disableClose>

    <mat-toolbar fxLayout="row" fxLayoutAlign="space-between center">
      <span>Menu</span>
      <button mat-icon-button class="example-icon" (click)="sidenav.close()">
        <mat-icon>menu</mat-icon>
      </button>
    </mat-toolbar>
    <mat-nav-list>
      <a mat-list-item [routerLink]="['./listado']" (click)="sidenav.close()">
        <mat-icon mat-list-icon>label</mat-icon>
        <span>Listado de heroes</span>
      </a>
      <a mat-list-item [routerLink]="['./buscar']" (click)="sidenav.close()">
        <mat-icon mat-list-icon>search</mat-icon>
        <span>Buscar heroe</span>
      </a>
      <a mat-list-item [routerLink]="['./agregar']" (click)="sidenav.close()">
        <mat-icon mat-list-icon>add</mat-icon>
        <span>Agregar de heroe</span>
      </a>
    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content>

    <mat-toolbar color="primary" fxLayout="row" fxLayoutAlign="space-between center">
      <div>
        <button mat-icon-button (click)="sidenav.open()">
          <mat-icon>menu</mat-icon>
        </button>
        <span>My App</span>
      </div>
      <div>
        <button mat-icon-button>
          <mat-icon>favorite</mat-icon>
        </button>
        <button mat-icon-button>
          <mat-icon>share</mat-icon>
        </button>
        <span>{{getUser.usuario}}</span>
        <button mat-flat-button color="accent" class="btn-logout" (click)="logout()">
          Logout
        </button>
      </div>
    </mat-toolbar>

    <div class="container">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
